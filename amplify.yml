version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Creating .env.production for SSR runtime env vars"
        - |
          cat > .env.production <<EOF
          # Generated by Amplify build (do not commit)

          # All variables below are set as regular Amplify Console environment variables.
          # Amplify Hosting Gen 1 Lambda runtime does not support Console Secrets injection.

          # Cognito Auth
          COGNITO_DOMAIN=${COGNITO_DOMAIN}
          COGNITO_REGION=${COGNITO_REGION}
          COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
          COGNITO_CLIENT_SECRET=${COGNITO_CLIENT_SECRET}
          COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}

          # Database — DIRECT_URL only needed for prisma migrate deploy in build
          DATABASE_URL=${DATABASE_URL}
          DIRECT_URL=${DIRECT_URL}

          # AWS Core
          APP_AWS_REGION=${APP_AWS_REGION}
          APP_AWS_ACCESS_KEY_ID=${APP_AWS_ACCESS_KEY_ID}
          APP_AWS_SECRET_ACCESS_KEY=${APP_AWS_SECRET_ACCESS_KEY}

          # S3 & CloudFront
          S3_REGION=${S3_REGION}
          S3_BUCKET_NAME=${S3_BUCKET_NAME}
          CLOUDFRONT_DISTRIBUTION_ID=${CLOUDFRONT_DISTRIBUTION_ID}
          CLOUDFRONT_DOMAIN=${CLOUDFRONT_DOMAIN}
          NEXT_PUBLIC_CLOUDFRONT_URL=${CLOUDFRONT_DOMAIN}

          # Email
          SES_FROM_EMAIL=${SES_FROM_EMAIL}
          CONTACT_EMAIL=${CONTACT_EMAIL}

          # Rate limiting (Upstash Redis)
          UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
          UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}

          # Sentry — SENTRY_AUTH_TOKEN is also read at runtime by the dashboard-external
          # route (admin dashboard Sentry card), so it must be in .env.production too,
          # not just available at build time for source-map uploads.
          NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN}
          SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
          SENTRY_ORG_SLUG=${SENTRY_ORG_SLUG}
          SENTRY_PROJECT_SLUG=${SENTRY_PROJECT_SLUG}

          # Amplify dashboard (build status)
          AMPLIFY_APP_ID=${AMPLIFY_APP_ID}

          # Google Analytics (dashboard metrics — optional)
          GA_PROPERTY_ID=${GA_PROPERTY_ID}

          # Anthropic (certificate extraction — optional, feature degrades gracefully if unset)
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

          # Portfolio MCP server API key
          PORTFOLIO_API_KEY=${PORTFOLIO_API_KEY}
          EOF
        - npm ci
        - npx prisma generate
    build:
      commands:
        - npx prisma migrate deploy || echo "Migration skipped - database not reachable"
        - rm -rf docs/screenshots .agents mcp .codex .claude/docs .claude/hooks .claude/agents
        - npm run build
        - find .next -name '*.js.map' -delete
    postBuild:
      commands:
        - echo "Build output size (bytes):"
        - du -sb .next | cut -f1
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
