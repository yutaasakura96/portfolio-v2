name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Cancel in-progress runs on the same ref (e.g. force-push during review).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    env:
      # Dummy value so `prisma generate` (run via `postinstall`) doesn't refuse
      # to read `prisma.config.ts`. No real DB is touched in CI yet — when a Neon
      # test branch is wired (see `.claude/rules/tests.md` §CI), swap this for a
      # real branch URL from secrets.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?sslmode=disable"
      # Upstash env vars are read lazily inside `rateLimit()`; unit tests mock
      # the limiter so values here are placeholders for any future integration.
      UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "placeholder"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test:ci
