name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Cancel in-progress runs on the same ref (e.g. force-push during review).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, type-check, build, test
    runs-on: ubuntu-latest

    env:
      # Dummy value so `prisma generate` (postinstall) and `next build` can
      # read prisma.config.ts. No real DB is touched in CI.
      # TODO: swap for a Neon branch URL from GitHub Secrets when integration
      # tests need a live DB (see `.claude/rules/tests.md` §CI).
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?sslmode=disable"
      # Upstash env vars are read lazily inside `rateLimit()`; unit tests mock
      # the limiter so values here are placeholders for any future integration.
      UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "placeholder"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npx next build

      - name: Test
        run: npm run test:ci
