name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Cancel in-progress runs on the same ref (e.g. force-push during review).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, type-check, build, test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ github.ref == 'refs/heads/main' && secrets.DATABASE_URL_PROD || secrets.DATABASE_URL_DEV }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npx next build

      - name: Check build output size
        run: |
          SIZE=$(du -sb .next | cut -f1)
          LIMIT=220000000
          echo "Build output: $(( SIZE / 1048576 ))MB ($SIZE bytes)"
          echo "Amplify limit: $(( LIMIT / 1048576 ))MB"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "::error::Build output ($SIZE bytes) exceeds Amplify deployment limit ($LIMIT bytes)"
            exit 1
          fi

      - name: Test
        run: npm run test:ci
