# When AGENTS.md is absent in a subdirectory, fall back to CLAUDE.md
# so Codex picks up scoped instructions (src/CLAUDE.md, prisma/CLAUDE.md, etc.)
project_doc_fallback_filenames = ["CLAUDE.md"]

# Combined AGENTS.md + fallback CLAUDE.md files are large; prevent truncation
project_doc_max_bytes = 131072

[mcp_servers.aws-api]
command = "uvx"
args = ["awslabs.aws-api-mcp-server@latest"]

[mcp_servers.aws-docs]
command = "uvx"
args = ["awslabs.aws-documentation-mcp-server@latest"]

[mcp_servers.aws-iac]
command = "uvx"
args = ["awslabs.aws-iac-mcp-server@latest"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.github]
command = "npx"
args = ["@modelcontextprotocol/server-github"]
env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN"]

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest", "--headless"]

[mcp_servers.portfolio]
command = "npx"
args = ["tsx", "--env-file=.env", "mcp/portfolio-server/src/index.ts"]

[mcp_servers.portfolio-prod]
command = "env"
args = ["PORTFOLIO_BASE_URL=https://asakurayuta.dev", "npx", "tsx", "--env-file=.env", "mcp/portfolio-server/src/index.ts"]

[mcp_servers.prisma-local]
command = "npx"
args = ["-y", "prisma", "mcp"]

[mcp_servers.sentry]
url = "https://mcp.sentry.dev/mcp"
